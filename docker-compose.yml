services:

  # ────────────────────────────────────────────────────────────
  # AODC + SAM2 + GECO2  — unified counting service  (port 7860)
  # ────────────────────────────────────────────────────────────
  geco2:
    build:
      context: .
      dockerfile: Dockerfile
    image: geco2:latest
    container_name: geco2
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      - AODC_CHECKPOINT=/app/aodc.pth
    volumes:
      # Drop your checkpoints here; no rebuild needed
      - ./CNTQG_multitrain_ca44.pth:/app/CNTQG_multitrain_ca44.pth:ro
      - ./aodc.pth:/app/aodc.pth:ro
    ports:
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - geco2_net

networks:
  geco2_net:
    driver: bridge
